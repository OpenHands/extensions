---
# TEMPORARY workflow to test PR #137 (fix/pr-review-use-plugin-load).
# Uses `push` trigger so GitHub runs the workflow from THIS branch,
# not from main (unlike pull_request_target).
# DELETE this file before merging.
name: "Test: PR Review with Plugin.load()"

on:
    push:
        branches: [fix/pr-review-use-plugin-load]

permissions:
    contents: read
    pull-requests: write
    issues: write

jobs:
    test-pr-review:
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout extensions (this branch)
              uses: actions/checkout@v4
              with:
                  ref: fix/pr-review-use-plugin-load
                  path: extensions

            - name: Checkout PR repo (same repo, this branch)
              uses: actions/checkout@v4
              with:
                  ref: fix/pr-review-use-plugin-load
                  fetch-depth: 0
                  persist-credentials: false
                  path: pr-repo
                  submodules: recursive

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.12'

            - name: Install uv
              uses: astral-sh/setup-uv@v6
              with:
                  enable-cache: true

            - name: Install GitHub CLI
              shell: bash
              run: |
                  sudo apt-get update
                  sudo apt-get install -y gh

            - name: Run PR review (against PR #137)
              shell: bash
              env:
                  LLM_MODEL: litellm_proxy/claude-sonnet-4-5-20250929
                  LLM_BASE_URL: https://llm-proxy.app.all-hands.dev
                  REVIEW_STYLE: roasted
                  LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
                  GITHUB_TOKEN: ${{ secrets.ALLHANDS_BOT_GITHUB_PAT }}
                  LMNR_PROJECT_API_KEY: ${{ secrets.LMNR_SKILLS_API_KEY }}
                  PR_NUMBER: '137'
                  PR_TITLE: 'fix: use Plugin.load() in pr-review agent_script.py'
                  PR_BODY: ''
                  PR_BASE_BRANCH: main
                  PR_HEAD_BRANCH: fix/pr-review-use-plugin-load
                  REPO_NAME: OpenHands/extensions
              run: |
                  cd pr-repo
                  uv run --no-project --with openhands-sdk --with openhands-tools --with lmnr \
                    python ../extensions/plugins/pr-review/scripts/agent_script.py

            - name: Upload logs as artifact
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: test-pr-review-plugin-load-logs
                  path: |
                      *.log
                      output/
                  retention-days: 7
