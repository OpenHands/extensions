name: publish-npm

# Publishes @openhands/extensions to npm when release-please pushes a version
# tag (v*). The tag is cut from main, which has already passed CI, so this
# workflow does not re-run CI checks.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # required for npm provenance (--provenance)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Verify package.json version matches the release tag
        run: |
          tag="${{ github.ref_name }}"
          pkg="v$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Release tag $tag does not match package.json version $pkg"
            exit 1
          fi
          echo "Publishing $pkg"

      - name: Publish to npm
        # No build/install step: the package ships plain ESM + hand-written .d.ts
        # and JSON catalogs, with only peerDependencies. `npm publish` packs the
        # files listed in package.json "files".
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
